name: Build book to html files

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup mdBook
        run: |
          cargo install mdbook
          mdbook --version

      - run: mdbook build
      
      - name: deploy
        uses: actions/upload-artifact@v6
        with: 
          name: "ETL MageAI Doc"
          path: book
          retention-days: 1
          

